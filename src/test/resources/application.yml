# H2
# datasource
spring:

  datasource:
    url: jdbc:h2:mem:test-db;MODE=MYSQL;
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

